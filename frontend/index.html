<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIA Drawing Bot — Shape Simulator</title>
  <meta name="description" content="Upload a PDF with a shape and watch the robot draw it in simulation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #07071a;
      --surface:     rgba(255,255,255,0.04);
      --border:      rgba(255,255,255,0.09);
      --accent:      #7c3aed;
      --accent2:     #06b6d4;
      --success:     #10b981;
      --error:       #ef4444;
      --text:        #e2e8f0;
      --muted:       #64748b;
      --glow:        rgba(124,58,237,0.35);
      --radius:      16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem;
      overflow-x: hidden;
    }

    /* Animated ambient background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 15% 50%, rgba(124,58,237,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 15%, rgba(6,182,212,0.12)  0%, transparent 50%),
        radial-gradient(ellipse at 55% 85%, rgba(16,185,129,0.08) 0%, transparent 40%);
      animation: ambientShift 10s ease-in-out infinite alternate;
    }
    @keyframes ambientShift { from{opacity:.7} to{opacity:1} }

    .container { position: relative; z-index: 1; width: 100%; max-width: 920px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2.5rem; }

    .badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(124,58,237,.15); border: 1px solid rgba(124,58,237,.35);
      padding: .35rem .9rem; border-radius: 999px; font-size: .75rem;
      color: #a78bfa; letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .badge span { width:6px; height:6px; background:#7c3aed; border-radius:50%;
      animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700;
      background: linear-gradient(135deg, #fff 25%, #a78bfa 60%, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: .5rem;
    }
    .subtitle { color: var(--muted); font-size: .95rem; }

    /* ── Card base ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px); padding: 2rem;
    }

    /* ── Upload zone ── */
    #drop-zone {
      border: 2px dashed rgba(124,58,237,.4); border-radius: var(--radius);
      padding: 3.5rem 2rem; text-align: center; cursor: pointer;
      transition: all .25s ease; position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent); background: rgba(124,58,237,.08);
      box-shadow: 0 0 40px var(--glow);
    }
    #drop-zone.drag-over { transform: scale(1.01); }

    .upload-icon {
      width: 64px; height: 64px; margin: 0 auto 1.25rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; box-shadow: 0 8px 30px var(--glow);
      transition: transform .3s ease;
    }
    #drop-zone:hover .upload-icon { transform: translateY(-4px) scale(1.05); }

    .drop-title   { font-size: 1.1rem; font-weight: 600; margin-bottom: .4rem; }
    .drop-subtitle{ color: var(--muted); font-size: .85rem; }

    #file-input { display: none; }

    .browse-btn {
      display: inline-block; margin-top: 1.2rem; padding: .55rem 1.4rem;
      background: rgba(124,58,237,.2); border: 1px solid rgba(124,58,237,.4);
      border-radius: 8px; color: #a78bfa; font-size: .85rem; font-weight: 500;
      cursor: pointer; transition: all .2s;
    }
    .browse-btn:hover { background: rgba(124,58,237,.35); color: #fff; }

    /* ── Options row ── */
    .options-row {
      display: flex; align-items: center; gap: 1rem;
      margin-top: 1.5rem; flex-wrap: wrap;
    }
    .options-row label { font-size: .85rem; color: var(--muted); }
    .mode-select {
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      color: var(--text); padding: .45rem .8rem; border-radius: 8px;
      font-size: .85rem; font-family: inherit; cursor: pointer;
      outline: none; transition: border .2s;
    }
    .mode-select:focus { border-color: var(--accent); }

    /* ── Steps indicator ── */
    .steps {
      display: flex; align-items: center; gap: 0; margin: 2rem 0;
      flex-wrap: wrap; justify-content: center;
    }
    .step {
      display: flex; flex-direction: column; align-items: center; gap: .4rem;
      flex: 1; min-width: 90px;
    }
    .step-dot {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; font-weight: 600; transition: all .4s ease;
      background: rgba(255,255,255,.06); border: 2px solid var(--border);
      color: var(--muted);
    }
    .step-label { font-size: .72rem; color: var(--muted); text-align: center; }
    .step.done  .step-dot { background: rgba(16,185,129,.2); border-color: var(--success); color: var(--success); }
    .step.active .step-dot { background: rgba(124,58,237,.25); border-color: var(--accent); color: #a78bfa;
      box-shadow: 0 0 20px var(--glow); animation: stepPulse 1.2s ease-in-out infinite; }
    @keyframes stepPulse { 0%,100%{box-shadow:0 0 15px var(--glow)} 50%{box-shadow:0 0 30px var(--glow)} }

    .step-line {
      flex: .5; height: 2px; background: var(--border); transition: background .4s;
      min-width: 20px;
    }
    .step-line.done { background: var(--success); }

    /* ── Preview panel ── */
    #preview-panel { display: none; margin-top: 1.5rem; }
    #preview-panel.visible { display: block; animation: fadeUp .4s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media(max-width:640px){ .preview-grid{ grid-template-columns:1fr; } }

    .preview-box {
      background: rgba(0,0,0,.3); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; position: relative;
    }
    .preview-box-label {
      position: absolute; top: .6rem; left: .8rem;
      background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.1);
      border-radius: 6px; padding: .2rem .55rem; font-size: .7rem;
      color: var(--muted); backdrop-filter: blur(6px); z-index: 2;
    }
    #debug-img { width: 100%; display: block; }
    #shape-canvas { width: 100%; display: block; background: rgba(0,0,0,.5); }

    .info-chips { display: flex; gap: .6rem; flex-wrap: wrap; margin-top: 1rem; }
    .chip {
      background: rgba(255,255,255,.05); border: 1px solid var(--border);
      border-radius: 8px; padding: .3rem .75rem; font-size: .78rem; color: var(--muted);
    }
    .chip strong { color: var(--text); }

    /* ── Action buttons ── */
    .actions { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }

    .btn {
      flex: 1; min-width: 140px; padding: .8rem 1.6rem;
      border-radius: 10px; font-family: inherit; font-size: .9rem; font-weight: 600;
      cursor: pointer; border: none; transition: all .25s ease; display: flex;
      align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      color: #fff; box-shadow: 0 6px 24px var(--glow);
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px var(--glow); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-ghost {
      background: rgba(255,255,255,.05); border: 1px solid var(--border); color: var(--muted);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.1); color: var(--text); }

    /* ── Launch button ── */
    #launch-btn {
      width: 100%; padding: 1rem; font-size: 1rem;
      background: linear-gradient(135deg, var(--success), #059669);
      box-shadow: 0 6px 28px rgba(16,185,129,.35);
      color: #fff; border: none; border-radius: 12px;
      font-family: inherit; font-weight: 700; cursor: pointer;
      transition: all .3s; display: none; margin-top: 1.5rem;
    }
    #launch-btn.visible { display: flex; align-items: center; justify-content: center; gap: .6rem; animation: fadeUp .4s ease; }
    #launch-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(16,185,129,.5); }
    #launch-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Status log ── */
    #status-log {
      margin-top: 1.5rem; background: rgba(0,0,0,.4);
      border: 1px solid var(--border); border-radius: 10px;
      padding: .8rem 1rem; font-size: .8rem; font-family: 'Courier New', monospace;
      color: #94a3b8; max-height: 130px; overflow-y: auto; display: none;
    }
    #status-log.visible { display: block; }
    .log-line { margin: .15rem 0; }
    .log-line.ok    { color: var(--success); }
    .log-line.err   { color: var(--error); }
    .log-line.info  { color: #a78bfa; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <div class="badge"><span></span>MuJoCo Simulation</div>
    <h1>RIA Drawing Bot</h1>
    <p class="subtitle">Upload a PDF containing a shape &mdash; the robot will draw it automatically.</p>
  </header>

  <!-- Main card -->
  <div class="card">

    <!-- Drop zone -->
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📄</div>
      <p class="drop-title">Drop your PDF here</p>
      <p class="drop-subtitle">Supports any PDF with a clear black shape on white background</p>
      <label class="browse-btn" onclick="event.stopPropagation();document.getElementById('file-input').click()">
        Browse file
      </label>
      <input type="file" id="file-input" accept=".pdf" />
    </div>

    <!-- Options -->
    <div class="options-row">
      <label for="mode-select">Contour mode:</label>
      <select id="mode-select" class="mode-select">
        <option value="polygon">Polygon (corner vertices – fast)</option>
        <option value="dense">Dense (smooth curves – slower)</option>
      </select>
      <div class="actions" style="margin-top:0;flex:1;">
        <button class="btn btn-primary" id="process-btn" disabled onclick="processPDF()">
          ⚙ Process PDF
        </button>
        <button class="btn btn-ghost" id="reset-btn" onclick="reset()">↺ Reset</button>
      </div>
    </div>

    <!-- Pipeline steps -->
    <div class="steps" id="steps">
      <div class="step" id="step-1"><div class="step-dot">1</div><div class="step-label">Parse PDF</div></div>
      <div class="step-line" id="line-1"></div>
      <div class="step" id="step-2"><div class="step-dot">2</div><div class="step-label">Detect Shape</div></div>
      <div class="step-line" id="line-2"></div>
      <div class="step" id="step-3"><div class="step-dot">3</div><div class="step-label">Map Coords</div></div>
      <div class="step-line" id="line-3"></div>
      <div class="step" id="step-4"><div class="step-dot">4</div><div class="step-label">Ready!</div></div>
    </div>

    <!-- Preview panel -->
    <div id="preview-panel">
      <div class="preview-grid">
        <div class="preview-box">
          <span class="preview-box-label">Debug Overlay</span>
          <img id="debug-img" alt="Detected shape overlay" />
        </div>
        <div class="preview-box">
          <span class="preview-box-label">Robot Path Preview</span>
          <canvas id="shape-canvas" width="400" height="300"></canvas>
        </div>
      </div>
      <div class="info-chips" id="info-chips"></div>
    </div>

    <!-- Launch simulation -->
    <button class="btn" id="launch-btn" onclick="launchSim()">
      🤖 Launch Simulation
    </button>

    <!-- Status log -->
    <div id="status-log"></div>

  </div><!-- /card -->
</div><!-- /container -->

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let selectedFile = null;
  let lastData     = null;

  // ── DOM helpers ──────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  function log(msg, type = "") {
    const el = $("status-log");
    el.classList.add("visible");
    const line = document.createElement("div");
    line.className = "log-line " + type;
    line.textContent = `[${new Date().toLocaleTimeString()}]  ${msg}`;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  function setStep(n, state) {
    // state: 'active' | 'done' | ''
    const s = $(`step-${n}`);
    s.className = "step " + state;
    if (n < 4) {
      const l = $(`line-${n}`);
      l.className = "step-line " + (state === "done" ? "done" : "");
    }
  }

  function resetSteps() {
    for (let i = 1; i <= 4; i++) setStep(i, "");
    for (let i = 1; i <= 3; i++) $(`line-${i}`).className = "step-line";
  }

  // ── File selection ───────────────────────────────────────────────────────
  const dropZone  = $("drop-zone");
  const fileInput = $("file-input");

  ["dragenter","dragover"].forEach(e =>
    dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add("drag-over"); }));
  ["dragleave","drop"].forEach(e =>
    dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove("drag-over"); }));
  dropZone.addEventListener("drop", ev => {
    const files = ev.dataTransfer.files;
    if (files.length) fileSelected(files[0]);
  });
  fileInput.addEventListener("change", () => {
    if (fileInput.files.length) fileSelected(fileInput.files[0]);
  });

  function fileSelected(file) {
    if (!file.name.toLowerCase().endsWith(".pdf")) {
      log("❌ Only PDF files are accepted.", "err"); return;
    }
    selectedFile = file;
    $("process-btn").disabled = false;
    log(`📄 Selected: ${file.name}  (${(file.size/1024).toFixed(1)} KB)`, "info");

    // Update drop zone label
    dropZone.querySelector(".drop-title").textContent = file.name;
    dropZone.querySelector(".drop-subtitle").textContent = "Ready to process";
    dropZone.querySelector(".upload-icon").textContent = "✅";
  }

  // ── Process PDF ──────────────────────────────────────────────────────────
  async function processPDF() {
    if (!selectedFile) return;

    $("process-btn").disabled = true;
    $("launch-btn").classList.remove("visible");
    $("preview-panel").classList.remove("visible");
    resetSteps();
    log("🚀 Starting pipeline…", "info");

    const fd = new FormData();
    fd.append("pdf", selectedFile);
    fd.append("mode", $("mode-select").value);

    setStep(1, "active");
    log("Step 1 — Parsing PDF…");

    let res, data;
    try {
      res  = await fetch("/process", { method: "POST", body: fd });
      data = await res.json();
    } catch (err) {
      log(`❌ Network error: ${err}`, "err");
      $("process-btn").disabled = false;
      return;
    }

    if (!data.success) {
      log(`❌ ${data.error}`, "err");
      $("process-btn").disabled = false;
      resetSteps();
      return;
    }

    // Animate step progression
    setStep(1, "done"); setStep(2, "active");
    await delay(350);
    log(`Step 2 — Shape detected (${data.num_points} point${data.num_points !== 1 ? "s" : ""}).`);
    setStep(2, "done"); setStep(3, "active");
    await delay(350);
    log("Step 3 — Coordinates mapped to robot workspace.");
    setStep(3, "done"); setStep(4, "active");
    await delay(350);
    setStep(4, "done");
    log("✅ Pipeline complete!", "ok");

    // Show preview
    lastData = data;
    showPreview(data);

    $("process-btn").disabled = false;
    const launchBtn = $("launch-btn");
    launchBtn.classList.add("visible");
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ── Preview ──────────────────────────────────────────────────────────────
  function showPreview(data) {
    // Debug overlay image
    $("debug-img").src = data.preview_image;

    // Draw robot path on canvas
    drawPath(data.pixel_points, data.image_width, data.image_height);

    // Info chips
    $("info-chips").innerHTML = `
      <div class="chip">Points: <strong>${data.num_points}</strong></div>
      <div class="chip">Mode: <strong>${data.mode}</strong></div>
      <div class="chip">Image: <strong>${data.image_width}×${data.image_height}</strong></div>
    `;

    $("preview-panel").classList.add("visible");
  }

  function drawPath(pts, imgW, imgH) {
    const canvas = $("shape-canvas");
    const ctx    = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    if (!pts || pts.length < 2) return;

    // Compute bounding box
    const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const rangeX = maxX - minX || 1, rangeY = maxY - minY || 1;
    const pad = 30;
    const scale = Math.min((W - pad*2) / rangeX, (H - pad*2) / rangeY);
    const offX  = pad + ((W - pad*2) - rangeX * scale) / 2;
    const offY  = pad + ((H - pad*2) - rangeY * scale) / 2;

    const tx = x => offX + (x - minX) * scale;
    const ty = y => offY + (y - minY) * scale;

    // Draw glow path
    ctx.shadowColor = "#7c3aed";
    ctx.shadowBlur  = 16;
    ctx.strokeStyle = "rgba(124,58,237,0.7)";
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.moveTo(tx(pts[0][0]), ty(pts[0][1]));
    for (let i = 1; i < pts.length; i++)
      ctx.lineTo(tx(pts[i][0]), ty(pts[i][1]));
    ctx.stroke();

    // Draw nodes
    ctx.shadowBlur = 8;
    ctx.fillStyle  = "#06b6d4";
    for (const p of pts) {
      ctx.beginPath();
      ctx.arc(tx(p[0]), ty(p[1]), 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Start point
    ctx.fillStyle = "#10b981";
    ctx.beginPath();
    ctx.arc(tx(pts[0][0]), ty(pts[0][1]), 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // ── Launch simulation ────────────────────────────────────────────────────
  async function launchSim() {
    $("launch-btn").disabled = true;
    $("launch-btn").textContent = "⏳ Launching…";
    log("🤖 Launching MuJoCo simulation…", "info");

    try {
      const res  = await fetch("/simulate", { method: "POST",
        headers: { "Content-Type": "application/json" }, body: "{}" });
      const data = await res.json();

      if (data.success) {
        log(`✅ ${data.message}`, "ok");
        $("launch-btn").textContent = "🤖 Launch Again";
      } else {
        log(`❌ ${data.error}`, "err");
        $("launch-btn").textContent = "🤖 Launch Simulation";
      }
    } catch (e) {
      log(`❌ ${e}`, "err");
      $("launch-btn").textContent = "🤖 Launch Simulation";
    }

    $("launch-btn").disabled = false;
  }

  // ── Reset ─────────────────────────────────────────────────────────────────
  function reset() {
    selectedFile = null; lastData = null;
    $("file-input").value = "";
    $("process-btn").disabled = true;
    $("preview-panel").classList.remove("visible");
    $("launch-btn").classList.remove("visible");
    $("status-log").innerHTML = ""; $("status-log").classList.remove("visible");
    resetSteps();
    dropZone.querySelector(".drop-title").textContent   = "Drop your PDF here";
    dropZone.querySelector(".drop-subtitle").textContent = "Supports any PDF with a clear black shape on white background";
    dropZone.querySelector(".upload-icon").textContent  = "📄";
  }
</script>
</body>
</html>
